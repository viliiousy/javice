<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>자비스 대시보드</title>
  <link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="자비스">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Login -->
<div id="loginScreen" class="login-screen">
  <div class="login-orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
  <div class="login-card">
    <div class="login-emoji">⚡</div>
    <h1 class="login-title">자비스</h1>
    <p class="login-sub">AI 기반 갓생 대시보드</p>
    <div class="login-features">
      <span>📅 구글 캘린더</span><span>✅ 구글 할일</span>
      <span>🥗 식단 기록</span><span>✅ 습관 관리</span>
      <span>✍️ 체크리스트</span><span>☁️ 기기간 동기화</span>
    </div>
    <button id="btnGoogleLogin" class="btn-google-login">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66 2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google로 로그인
    </button>
    <button id="btnOfflineMode" class="btn-offline">오프라인 모드로 시작</button>
    <p class="login-note">캘린더·할일·Drive 권한이 필요합니다</p>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">

  <div class="header-sticky-group">
  <header class="header" style="position:static;box-shadow:none;">
    <div class="h-left">
      <a href="/" class="h-logo" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:1px"><img src="icons/icon-192.png" style="width:28px;height:28px;border-radius:6px"><span style="font-size:9px;font-weight:700;color:var(--accent);letter-spacing:0.5px">자비스</span></a>
      <div class="h-date">
        <div id="hDate" class="h-date-main"></div>
        <div id="hDay" class="h-date-sub"></div>
      </div>
    </div>
    <div class="h-right">
      <div id="hWeather" class="h-weather-wrap"></div>
      <div id="hUser" class="h-user" style="display:none" onclick="App.toggleProfileMenu()">
        <img id="hAvatar" src="" alt="" class="h-avatar">
        <span id="hName" class="h-name"></span>
        <span class="h-chevron">▾</span>
      </div>
      <div id="profileMenu" class="profile-menu hidden">
        <div class="profile-menu-item" style="font-size:11px;color:var(--text3);cursor:default;padding:6px 16px;border-bottom:1px solid var(--border)">v26.05.25.0116 업데이트</div>
        <div class="profile-menu-item" onclick="Notifications.showSettings()">🔔 알림 설정</div>
        <div class="profile-menu-item" onclick="App.toggleDarkMode()"><span id="darkModeLabel">🌙 다크 모드</span></div>
        <div class="profile-menu-item" onclick="App.toggleSound()"><span id="soundLabel">🔔 사운드 켜짐</span></div>
        <div class="profile-menu-item" onclick="Auth.logout()">🚪 로그아웃</div>
      </div>
    </div>
  </header>

  <div id="statsBanner" class="stats-banner"></div>
  </div>

  <div class="dashboard">

    <!-- 할일 -->
    <section class="card card-tasks">
      <div class="card-head">
        <span class="card-title">📋 할일</span>
        <div class="card-acts">
          <button class="btn-sm" id="btnSync" title="동기화">🔄</button>
          <button class="btn-sm" id="btnShowCompleted" title="완료됨 보기">✓</button>
          <button class="btn-sm" id="btnShowHidden" title="숨김 보기">🙈</button>
          <button class="btn-sm accent" id="btnAddTask">+ 추가</button>
        </div>
      </div>
      <div id="taskFilters" class="task-filter-wrap"></div>
      <div class="task-form hidden" id="taskForm">
        <input type="text" id="taskInput" placeholder="할일 입력..." class="inp">
        <div class="task-form-row">
          <select id="taskListSel" class="inp inp-sm"></select>
          <input type="date" id="taskDue" class="inp inp-sm">
        </div>
        <div class="task-form-btns">
          <button id="btnSaveTask" class="btn-sm accent">저장</button>
          <button id="btnCancelTask" class="btn-sm">취소</button>
        </div>
      </div>
      <div id="tasksContainer" class="tasks-wrap"><p class="empty">🔄 불러오는 중...</p></div>
    </section>

    <!-- 캘린더 -->
    <section class="card card-calendar">
      <div class="card-head">
        <span class="card-title">📅 캘린더</span>
        <div class="card-acts">
          <button class="btn-sm" id="btnCalSettings" title="캘린더 설정">⚙️</button>
          <button class="btn-sm accent" id="btnAddEvent">+ 일정</button>
        </div>
      </div>
      <div id="miniCal" class="mini-cal"></div>
      <div class="cal-panel-tabs">
        <button class="cal-panel-tab active" onclick="App.setCalPanel('today',this)">오늘</button>
        <button class="cal-panel-tab" onclick="App.setCalPanel('week',this)">이번 주</button>
        <button class="cal-panel-tab" onclick="App.setCalPanel('month',this)">이번 달</button>
      </div>
      <div id="eventsWrap" class="events-wrap"></div>
    </section>

    <!-- 체크리스트 -->
    <section class="card card-checklist">
      <div class="card-head">
        <span class="card-title">✍️ 체크리스트</span>
        <button class="btn-sm" id="btnClReorder" onclick="Checklist.toggleReorderMode()" title="순서 변경">↕️</button>
      </div>
      <div id="checklistWrap" class="checklist-wrap"></div>
    </section>

    <!-- 습관 -->
    <section class="card card-habits">
      <div class="card-head">
        <span class="card-title">✅ 오늘의 습관</span>
        <button class="btn-sm" id="btnHabitReorder" onclick="Habits.toggleReorderMode()" title="순서 변경">↕️</button>
      </div>
      <div id="habitsWrap" class="habits-wrap"></div>
      <div id="habitsFooter" class="habits-footer"></div>
    </section>

    <!-- 식단 -->
    <section class="card card-diet">
      <div class="card-head">
        <span class="card-title">🥗 식단 기록</span>
        <span id="dietBadge" class="badge"></span>
      </div>
      <div id="dietWrap" class="diet-wrap"></div>
    </section>

    <!-- 메모 -->
    <section class="card card-memo">
      <div class="card-head">
        <span class="card-title">📝 메모</span>
        <button class="btn-sm" id="btnMemoReorder" onclick="Memo.toggleReorderMode()" title="순서 변경">↕️</button>
      </div>
      <div id="memoWrap" class="memo-wrap"></div>
    </section>

  </div>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalTitle"></h3>
      <button id="btnModalClose" class="modal-close">✕</button>
    </div>
    <div id="modalBody" class="modal-body"></div>
  </div>
</div>
<div id="toast" class="toast hidden"></div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="js/config.js"></script>
<script src="js/user-store.js"></script>
<script src="js/sounds.js"></script>
<script src="js/notifications.js"></script>

<script src="js/reorder.js"></script>
<script src="js/google-auth.js"></script>
<script src="js/google-calendar.js"></script>
<script src="js/google-tasks.js"></script>
<script src="js/firebase-sync.js"></script>
<script src="js/calendar-ui.js"></script>
<script src="js/fitness.js"></script>
<script src="js/diet.js"></script>
<script src="js/habits.js"></script>
<script src="js/checklist.js"></script>
<script src="js/memo.js"></script>
<script src="js/weather.js"></script>
<script src="js/app.js"></script>
<script src="js/jarvis.js"></script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});</script>
<!-- Firebase compat SDK for FCM -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<script>
window.addEventListener('load', function() {
  try {
    if(!firebase.apps.length) firebase.initializeApp(CONFIG.FIREBASE_CONFIG);
    const _msg = firebase.messaging();
    window._fcmGetToken = async function() {
      try {
        const sw = await navigator.serviceWorker.getRegistration('/firebase-messaging-sw.js');
        const token = await _msg.getToken({
          vapidKey: CONFIG.FCM_VAPID_KEY,
          serviceWorkerRegistration: sw
        });
        console.log('[FCM] 토큰:', token ? '성공 '+token.slice(0,15)+'...' : 'null');
        return token || null;
      } catch(e) { console.error('[FCM] 오류:', e.code||'', e.message); return null; }
    };
    console.log('[FCM] SDK 준비완료');
  } catch(e) { console.error('[FCM] init 실패:', e.message); }
});
</script>
</body>
</html>
